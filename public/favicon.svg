<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120">
  <defs>
    <!-- Metallic Gold Gradient matching luxury styling -->
    <linearGradient id="luxuryGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bf953f" />
      <stop offset="25%" stop-color="#fcf6ba" />
      <stop offset="50%" stop-color="#b38728" />
      <stop offset="75%" stop-color="#fbf5b7" />
      <stop offset="100%" stop-color="#aa771c" />
    </linearGradient>
  </defs>
  <!-- Camera Outline -->
  <path
    d="M 15,45 
       A 6,6 0 0,1 21,39 
       L 35,39 
       A 4,4 0 0,0 38,36 
       L 41,31 
       A 6,6 0 0,1 46,27 
       L 64,27 
       A 6,6 0 0,1 69,31 
       L 72,36 
       A 4,4 0 0,0 75,39 
       L 89,39 
       A 6,6 0 0,1 95,45 
       L 95,89 
       A 6,6 0 0,1 89,95 
       L 21,95 
       A 6,6 0 0,1 15,89 
       Z"
    fill="none"
    stroke="url(#luxuryGold)"
    stroke-width="4.5"
    stroke-linejoin="round"
  />
  <!-- Shutter Button -->
  <path d="M 25,39 L 25,34 C 25,33, 31,33, 31,34 L 31,39 Z" fill="url(#luxuryGold)" />
  
  <!-- Lens circle -->
  <circle cx="55" cy="67" r="22" fill="none" stroke="url(#luxuryGold)" stroke-width="4.5" />
  
  <!-- Aperture blades inside -->
  <g transform="translate(55, 67)">
    <path d="M 0,-18 L 15.6,-9 L 3.6,-3.6 Z" fill="url(#luxuryGold)" />
    <path d="M 0,-18 L 15.6,-9 L 3.6,-3.6 Z" fill="url(#luxuryGold)" transform="rotate(60)" />
    <path d="M 0,-18 L 15.6,-9 L 3.6,-3.6 Z" fill="url(#luxuryGold)" transform="rotate(120)" />
    <path d="M 0,-18 L 15.6,-9 L 3.6,-3.6 Z" fill="url(#luxuryGold)" transform="rotate(180)" />
    <path d="M 0,-18 L 15.6,-9 L 3.6,-3.6 Z" fill="url(#luxuryGold)" transform="rotate(240)" />
    <path d="M 0,-18 L 15.6,-9 L 3.6,-3.6 Z" fill="url(#luxuryGold)" transform="rotate(300)" />
  </g>

  <!-- AR Monogram serif text joined to the camera -->
  <text
    x="90"
    y="88"
    font-family="'Playfair Display', serif"
    font-size="62"
    font-weight="bold"
    fill="url(#luxuryGold)"
    letter-spacing="-4"
  >
    AR
  </text>
</svg>
